name: Vic_Daily_Report
on:
  schedule:
    - cron: '17 9 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 檢查程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝必要套件
        run: pip install -r requirements.txt

      # 執行「資產日報」 (Main.py)
      - name: 執行「資產日報」 (Main.py)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 60
          command: python Main.py
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          
      # 執行「保固追蹤」 (warranty.py) → 產生 docs/index.html
      - name: 執行「保固追蹤」 (warranty.py)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 60
          command: python warranty.py
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}

      # 部署 HTML 到 GitHub Pages（取代舊的 git commit 方式）
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # 將每日報表存檔到 Daily_Report 目錄
      - name: 存檔每日報表到 Daily_Report
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add Daily_Report/
          if git diff --staged --quiet; then
            echo "沒有新報表，跳過"
          else
            git commit -m "存檔每日報表 $(date +%Y-%m-%d) [skip ci]"
            git push
          fi
