name: Vic_Daily_Report

on:
  schedule:
    # 每天台灣時間 17:17 執行 (UTC 09:17) 
    - cron: '17 9 * * *'
  workflow_dispatch: # 讓你隨時可以手動點擊執行測試

jobs:
  build:
    runs-on: ubuntu-latest
    
    # 這裡設定全域環境變數，讓下方的所有程式都能共用 Secrets
    env:
      LINE_CHANNEL_ID: ${{ secrets.LINE_CHANNEL_ID }}
      LINE_CHANNEL_SECRET: ${{ secrets.LINE_CHANNEL_SECRET }}
      LINE_USER_ID: ${{ secrets.LINE_USER_ID }}

    steps:
      - name: 檢查程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝必要套件
        run: |
          pip install -r requirements.txt

      - name: 執行「資產日報」 (Main.py)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10     # 執行超時限制
          max_attempts: 3          # 失敗後最多重試 3 次
          retry_wait_seconds: 60   # 失敗後等待 60 秒再試
          command: python Main.py

      - name: 執行「保固追蹤」 (warranty.py)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10     # 執行超時限制
          max_attempts: 3          # 失敗後最多重試 3 次
          retry_wait_seconds: 60   # 失敗後等待 60 秒再試
          command: python warranty.py
