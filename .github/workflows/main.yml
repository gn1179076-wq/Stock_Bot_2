name: Vic_Daily_Report

on:
  schedule:
    # 每天台灣時間 17:17 執行 (UTC 09:17)
    - cron: '17 9 * * *'
  workflow_dispatch: # 允許手動執行測試

jobs:
  build:
    runs-on: ubuntu-latest
    
    # 1. 在此設定全域環境變數，讓底下的所有 Python 程式都能抓到 Secrets
    env:
      LINE_CHANNEL_ID: ${{ secrets.LINE_CHANNEL_ID }}
      LINE_CHANNEL_SECRET: ${{ secrets.LINE_CHANNEL_SECRET }}
      LINE_USER_ID: ${{ secrets.LINE_USER_ID }}

    steps:
      - name: 檢查程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝必要套件
        run: |
          pip install -r requirements.txt

      # 2. 執行「資產日報」 (Main.py) - 若不需要可自行註解
      #- name: 執行「資產日報」 (Main.py)
      #  uses: nick-fields/retry@v3
      #  with:
      #    timeout_minutes: 10
      #    max_attempts: 3
      #    retry_wait_seconds: 60
      #    command: python Main.py

      # 3. 執行「保固追蹤」 (warranty.py)
      - name: 執行「保固追蹤」 (warranty.py)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 60
          command: python warranty.py

      # 4. 儲存 HTML 到 Artifacts (ZIP 檔案備份)
      - name: 儲存保固報表到 Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Warranty-Report
          path: warranty_report.html
          retention-days: 7

      # 5. 將產出的 HTML 存回檔案庫 (為了讓 GitHub Pages 網址生效)
      # 注意：這會讓你的 GitHub 檔案列表看到更新後的 html
      - name: 將 HTML 自動存回檔案庫
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add warranty_report.html
          git commit -m "自動更新保固報表 [skip ci]" || exit 0
          git push
