name: Vic_Daily_Report

on:
  schedule:
    - cron: '17 9 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    # 修正：把 env 放到這裡，這是最穩定的全域寫法
    env:
      LINE_CHANNEL_ID: ${{ secrets.LINE_CHANNEL_ID }}
      LINE_CHANNEL_SECRET: ${{ secrets.LINE_CHANNEL_SECRET }}
      LINE_USER_ID: ${{ secrets.LINE_USER_ID }}

    steps:
      - name: 檢查程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝必要套件
        run: pip install -r requirements.txt

      - name: 執行「資產日報」 (Main.py)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 60
          command: python Main.py

      - name: 執行「保固追蹤」 (warranty.py)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 60
          command: python warranty.py

      - name: 將 HTML 自動存回檔案庫
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add warranty_report.html
          git commit -m "自動更新保固報表 [skip ci]" || exit 0
          git push
