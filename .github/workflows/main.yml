name: Stock_Daily_Report

on:
  schedule:
    # 這裡設定時間，UTC 00:30 等於台灣時間 08:30 (開盤前看一眼)
    - cron: '30 0 * * *'
  workflow_dispatch: # 這行讓妳可以隨時手動點擊執行測試

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 複製程式碼
        uses: actions/checkout@v3

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 安裝必要套件
        run: |
          pip install -r requirements.txt

      - name: 執行報表程式
        run: python main.py
