name: Vic_Daily_Report_0417_A02

on:
  workflow_dispatch:      # 支援 GitHub 網頁手動點擊執行

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 檢查程式碼 (0417_A02)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }} # 👈 將這裡改成這個，它會自動抓取當前觸發的分支名稱

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝必要套件
        run: pip install -r requirements.txt
        
      # 👈 新增：確保 Log 存放的資料夾存在
      - name: 準備 Log 資料夾
        run: mkdir -p Daily_Report
        echo "GITHUB_REF_NAME: ${{ github.ref_name }}"
        echo "GH_REF_NAME_ENV: $GITHUB_REF_NAME" # 檢查環境變數本身
        
      # 執行「資產日報」 (Main.py)
      - name: 執行「資產日報」 (Main.py)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 60
          # 👈 修改：使用 tee -a 同時印出並將 log 寫入檔案 (加上日期)
          command: bash -c "python Main.py 2>&1 | tee -a Daily_Report/build_$(date +'%Y-%m-%d').log"
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          REPORT_PWD: ${{ secrets.REPORT_PWD }}

      # 執行「保固追蹤」 (warranty.py) → 產生 docs/index.html
      - name: 執行「保固追蹤」 (warranty.py)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 60
          # 👈 修改：一樣使用 tee -a，因為是 -a (append)，所以兩支程式的 log 會接續存在同一個檔案裡
          command: bash -c "python warranty.py 2>&1 | tee -a Daily_Report/build_$(date +'%Y-%m-%d').log"
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          REPORT_PWD: ${{ secrets.REPORT_PWD }}
          LINE_CHANNEL_ID: ${{ secrets.LINE_CHANNEL_ID }}
          LINE_CHANNEL_SECRET: ${{ secrets.LINE_CHANNEL_SECRET }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}

      # 部署 HTML 到 GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # 將每日報表與 Log 存檔到 Daily_Report 目錄
      - name: 存檔每日報表與 Log 到 Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add Daily_Report/
          if git diff --staged --quiet; then
            echo "沒有新報表與紀錄，跳過"
          else
            # 👈 修改：把 Commit 訊息加上 "與執行紀錄" 讓您更清楚
            git commit -m "存檔每日報表與執行紀錄 $(date +%Y-%m-%d) [skip ci]"
            git push
          fi
