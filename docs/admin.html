<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理後台</title>
  <style>
    *,*::before,*::after{box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f7fafc;margin:0;padding:20px;color:#2d3748}
    .header{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:20px 24px;border-radius:16px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between}
    .header h1{margin:0;font-size:1.4rem}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:8px;border:none;font-size:.9rem;font-weight:600;cursor:pointer;transition:opacity .2s}
    .btn-primary{background:#667eea;color:#fff}.btn-danger{background:#e53e3e;color:#fff}.btn-success{background:#38a169;color:#fff}.btn-sm{padding:5px 12px;font-size:.8rem}.btn:hover{opacity:.85}
    .card{background:#fff;border-radius:12px;box-shadow:0 4px 15px rgba(0,0,0,.08);padding:20px;margin-bottom:20px}
    table{width:100%;border-collapse:collapse}
    th{background:#f7fafc;color:#718096;font-size:.75rem;font-weight:700;text-transform:uppercase;padding:10px 14px;text-align:left;border-bottom:2px solid #edf2f7}
    td{padding:12px 14px;font-size:.88rem;border-bottom:1px solid #f7fafc;vertical-align:middle}
    tr:hover{background:#f7fafc}
    .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;justify-content:center;align-items:center}
    .modal.active{display:flex}
    .modal-box{background:#fff;border-radius:16px;padding:28px;width:480px;max-width:95vw;max-height:90vh;overflow-y:auto}
    .token-bar{background:#fff;border-radius:10px;padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
    .token-bar input{flex:1;padding:8px 12px;border:2px solid #e2e8f0;border-radius:8px;font-size:.88rem;outline:none}
    .status{font-size:.8rem;padding:4px 10px;border-radius:6px}
    .status.ok{background:#f0fff4;color:#38a169}.status.err{background:#fff5f5;color:#e53e3e}
    #toast{position:fixed;bottom:24px;right:24px;background:#2d3748;color:#fff;padding:12px 20px;border-radius:10px;font-size:.88rem;display:none;z-index:99999}
    .tabs{display:flex;gap:8px;margin-bottom:20px}
    .tab-btn{padding:10px 22px;border-radius:10px;border:2px solid #e2e8f0;background:#fff;font-size:.9rem;font-weight:600;cursor:pointer;color:#718096;transition:all .2s}
    .tab-btn.active{background:#667eea;color:#fff;border-color:#667eea}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .market-badge{padding:2px 8px;border-radius:6px;font-size:.75rem;font-weight:700}
    .market-TW{background:#ebf8ff;color:#2b6cb0}
    .market-US{background:#f0fff4;color:#276749}
    .market-HK{background:#fff5f5;color:#c53030}
    .market-JP{background:#fffff0;color:#744210}
  </style>
</head>
<body>
  <div class="token-bar">
    <span style="font-weight:700;color:#4a5568;white-space:nowrap">GitHub Token</span>
    <input type="password" id="ghToken" placeholder="ghp_xxxxxxxxxxxx">
    <button class="btn btn-primary btn-sm" onclick="loadAll()">載入資產與股票</button>
    <span id="tokenStatus"></span>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('assets')">🏠 家務資產</button>
    <button class="tab-btn" onclick="switchTab('portfolio')">📈 股票投資組合</button>
    <button class="tab-btn" onclick="switchTab('card')">💳 信用卡扣款</button>
  </div>

  <div class="tab-panel active" id="tab-assets">
    <div class="header"><h1>家務資產管理後台</h1><button class="btn btn-success" onclick="openAdd()">+ 新增項目</button></div>
    <div class="card" id="tableArea"><p style="text-align:center;color:#a0aec0;padding:40px 0">請輸入 Token 後點擊載入</p></div>
  </div>

  <div class="tab-panel" id="tab-portfolio">
    <div class="header" style="background:linear-gradient(135deg,#48bb78,#2f855a)"><h1>股票投資組合管理</h1><button class="btn btn-success" onclick="openAddStock()">+ 新增持股</button></div>
    <div class="card" id="portfolioArea"><p style="text-align:center;color:#a0aec0;padding:40px 0">請輸入 Token 後點擊載入</p></div>
  </div>

  <div class="tab-panel" id="tab-card">
    <div class="header" style="background:linear-gradient(135deg,#ed8936,#dd6b20)">
      <h1>信用卡繳款管理</h1>
      <button class="btn" style="background:#c05621" onclick="resetCardStatus()">重置狀態</button>
    </div>
    <div class="card" id="cardArea"></div>
  </div>

  <div id="toast"></div>

<script>
// --- 基礎設定 ---
const REPO="gn1179076-wq/Stock_Bot_2",BRANCH="Main";
const FILE_PATH="home_assets.json",PORTFOLIO_PATH="portfolio.json";
let assets=[],portfolio=[];

// --- 信用卡邏輯 (localStorage) ---
const creditCards = [
    { id: 'cat', name: '國泰世華', date: '每月 2 日' },
    { id: 'yu', name: '玉山信用卡', date: '每月 3～5 日' },
    { id: 'fubon', name: '台北富邦', date: '每月 9～12 日' },
    { id: 'ctbc', name: '中國信託', date: '每月 28 日' },
    { id: 'dbs', name: '星展銀行', date: '請登入 DBS Card+' }
];

function renderCards() {
    let html = `<table><thead><tr><th>扣款確認</th><th>銀行</th><th>繳款日</th></tr></thead><tbody>`;
    creditCards.forEach(card => {
        const isChecked = localStorage.getItem('card_' + card.id) === 'true';
        html += `<tr>
            <td><input type="checkbox" ${isChecked ? 'checked' : ''} onchange="toggleCard('${card.id}', this.checked)"></td>
            <td><strong>${card.name}</strong></td>
            <td>${card.date}</td>
        </tr>`;
    });
    html += `</tbody></table>`;
    document.getElementById('cardArea').innerHTML = html;
}

function toggleCard(id, checked) {
    localStorage.setItem('card_' + id, checked);
    toast(checked ? '已標記：已扣款 ✅' : '已取消標記');
}

function resetCardStatus() {
    if(!confirm('確定要清除所有勾選狀態嗎？')) return;
    creditCards.forEach(c => localStorage.removeItem('card_' + c.id));
    renderCards();
    toast('狀態已重置');
}

// --- GitHub API 邏輯 (簡化版) ---
function token(){return document.getElementById('ghToken').value.trim()}
async function apiGet(p){const r=await fetch(`https://api.github.com/repos/${REPO}/${p}`,{headers:{Authorization:`Bearer ${token()}`,Accept:'application/vnd.github+json'}});if(!r.ok)throw new Error(r.status);return r.json()}
async function apiPut(p,b){const r=await fetch(`https://api.github.com/repos/${REPO}/${p}`,{method:'PUT',headers:{Authorization:`Bearer ${token()}`,Accept:'application/vnd.github+json','Content-Type':'application/json'},body:JSON.stringify(b)});if(!r.ok)throw new Error(await r.text());return r.json()}

function switchTab(tab){
    const tabs = ['assets', 'portfolio', 'card'];
    document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active', tabs[i]===tab));
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    document.getElementById('tab-'+tab).classList.add('active');
    if(tab === 'card') renderCards();
}

async function loadAll(){
  const st=document.getElementById('tokenStatus');
  try{
    const d1=await apiGet(`contents/${FILE_PATH}?ref=${BRANCH}`);
    assets=JSON.parse(decodeURIComponent(escape(atob(d1.content.replace(/\n/g,'')))));
    const d2=await apiGet(`contents/${PORTFOLIO_PATH}?ref=${BRANCH}`);
    portfolio=JSON.parse(decodeURIComponent(escape(atob(d2.content.replace(/\n/g,'')))));
    st.innerHTML='<span class="status ok">連線成功</span>';
    // 渲染函數在此呼叫 (需確保 renderTable 與 renderPortfolio 函數存在於你的原始碼中)
    renderTable(); renderPortfolio(); renderCards();
  }catch(e){st.innerHTML=`<span class="status err">載入失敗: ${e.message}</span>`}
}

let toastTimer;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.style.display='block';clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.style.display='none',3000)}

// 初始化渲染
renderCards();
</script>
</body>
</html>
